<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reliance Digital — Spin & Unlock</title>
  <style>
    :root {
      --bg: #eef3f9;
      --card: rgba(255,255,255,0.82);
      --border: rgba(15, 23, 42, 0.08);
      --text: #0f172a;
      --muted: #5b677a;
      --blue: #1d4ed8;
      --red: #dc2626;
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(29,78,216,0.10), transparent 26%),
        radial-gradient(circle at top right, rgba(220,38,38,0.08), transparent 24%),
        linear-gradient(180deg, var(--bg), #ffffff 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 22px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 16px 22px;
      border-radius: 22px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.75);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      position: sticky;
      top: 16px;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--blue), var(--red));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 17px;
      box-shadow: 0 10px 24px rgba(29,78,216,0.22);
    }

    .brand-text strong {
      display: block;
      font-size: 18px;
      letter-spacing: .2px;
    }

    .brand-text span {
      font-size: 13px;
      color: var(--muted);
    }

    .header-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(15,23,42,0.06);
    }

    .hero {
      display: block;
      padding: 26px 0 12px;
      min-height: calc(100vh - 120px);
    }

    .hero-wheel {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 24px 24px;
      border-radius: 36px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.85);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .wheel-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .wheel-topbar h2 {
      margin: 0;
      font-size: 22px;
    }

    .wheel-topbar p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-chip {
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      color: var(--blue);
      background: rgba(29,78,216,0.10);
      border: 1px solid rgba(29,78,216,0.14);
      white-space: nowrap;
    }

    .wheel-stage {
      padding: 18px 0 8px;
    }

    .reel-shell {
      position: relative;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      border-radius: 32px;
      padding: 18px;
      background: radial-gradient(circle at 30% 20%, #ffffff, #edf3fb 55%, #d8e1ef 100%);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.9), inset 0 -10px 20px rgba(148,163,184,0.16), 0 32px 70px rgba(15,23,42,0.14);
      overflow: hidden;
    }

    .reel-shell::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 26px;
      border: 2px solid rgba(255,255,255,0.82);
      pointer-events: none;
      z-index: 1;
    }

    .reel-viewport {
      position: relative;
      height: 240px;
      overflow: hidden;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.86), rgba(248,250,252,0.75));
      border: 1px solid rgba(15,23,42,0.06);
      box-shadow: inset 0 0 30px rgba(255,255,255,0.42);
    }

    .reel-track {
      display: flex;
      align-items: center;
      gap: 18px;
      position: absolute;
      left: 0;
      top: 50%;
      transform: translate3d(0, -50%, 0);
      transition: transform 4.8s cubic-bezier(.12,.84,.18,1);
      padding: 0 260px;
      will-change: transform;
    }

    .reel-divider {
      width: 12px;
      min-width: 12px;
      height: 132px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(203,213,225,0.2), rgba(148,163,184,0.55), rgba(203,213,225,0.2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), 0 4px 10px rgba(15,23,42,0.06);
      opacity: 0.95;
    }

    .reel-card {
      width: 180px;
      min-width: 180px;
      height: 180px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(241,245,249,0.96));
      border: 1px solid rgba(15,23,42,0.07);
      box-shadow: 0 14px 28px rgba(15,23,42,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .reel-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.22), transparent 40%, transparent 70%, rgba(255,255,255,0.08));
      pointer-events: none;
    }

    .reel-icon {
      font-size: 44px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .reel-img {
      width: 88px;
      height: 88px;
      object-fit: cover;
      border-radius: 22px;
      margin-bottom: 12px;
      display: none;
    }

    .reel-title {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .reel-sub {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.35;
      color: var(--muted);
      min-height: 18px;
    }

    .reel-card.product .reel-img { display: block; }
    .reel-card.product .reel-icon { display: none; }

    .reel-fade-left,
    .reel-fade-right {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100px;
      z-index: 3;
      pointer-events: none;
    }

    .reel-fade-left {
      left: 0;
      background: linear-gradient(90deg, rgba(248,250,252,0.96), rgba(248,250,252,0));
    }

    .reel-fade-right {
      right: 0;
      background: linear-gradient(270deg, rgba(248,250,252,0.96), rgba(248,250,252,0));
    }

    .reel-focus {
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 50%;
      width: 196px;
      transform: translateX(-50%);
      border-radius: 30px;
      border: 3px solid rgba(29,78,216,0.18);
      box-shadow: 0 0 0 8px rgba(29,78,216,0.06), inset 0 0 0 1px rgba(255,255,255,0.65);
      z-index: 4;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    }

    .reel-center-line {
      position: absolute;
      left: 50%;
      top: 18px;
      bottom: 18px;
      width: 4px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(29,78,216,0.0), rgba(29,78,216,0.42), rgba(29,78,216,0.0));
      z-index: 5;
      pointer-events: none;
    }

    .reel-arrow-left,
    .reel-arrow-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 18px;
      height: 18px;
      background: var(--red);
      clip-path: polygon(0 50%, 100% 0, 100% 100%);
      filter: drop-shadow(0 6px 10px rgba(220,38,38,0.20));
    }

    .reel-arrow-left {
      left: calc(50% - 120px);
      transform: translateY(-50%) rotate(180deg);
    }

    .reel-arrow-right {
      right: calc(50% - 120px);
    }

    .reel-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 220px;
      height: 190px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(29,78,216,0.08), transparent 70%);
      pointer-events: none;
      z-index: 2;
    }

    .control-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 18px;
    }

    .stage-label {
      font-size: 15px;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
    }

    .spin-btn,
    .btn {
      min-width: 220px;
